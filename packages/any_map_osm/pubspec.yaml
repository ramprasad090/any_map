name: any_map_osm
description: "OpenStreetMap adapter for any_map using flutter_map. Free, open-source tile rendering with no API key required."
version: 0.1.0
homepage: https://github.com/ramprasad090/any_map
repository: https://github.com/ramprasad090/any_map/tree/main/packages/any_map_osm
issue_tracker: https://github.com/ramprasad090/any_map/issues

topics:
  - maps
  - openstreetmap
  - flutter-map

platforms:
  android:
  ios:
  web:
  macos:
  windows:
  linux:

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  any_map:
    path: ../any_map
  flutter_map: ^7.0.0
  latlong2: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
