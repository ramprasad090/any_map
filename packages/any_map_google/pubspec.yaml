name: any_map_google
description: "Google Maps adapter for any_map. Uses google_maps_flutter under the hood for Android and iOS map rendering."
version: 1.0.0
homepage: https://github.com/ramprasad090/any_map
repository: https://github.com/ramprasad090/any_map/tree/main/packages/any_map_google
issue_tracker: https://github.com/ramprasad090/any_map/issues

topics:
  - maps
  - google-maps

platforms:
  android:
  ios:

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  any_map: ^1.0.0
  google_maps_flutter: ^2.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
