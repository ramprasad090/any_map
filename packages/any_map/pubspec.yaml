name: any_map
description: "Unified map abstraction for Flutter. One API to swap Google Maps, MapLibre, or OSM. Routing, traffic, geofencing, clustering, analytics, and 30+ features."
version: 0.1.0
homepage: https://github.com/ramprasad090/any_map
repository: https://github.com/ramprasad090/any_map
issue_tracker: https://github.com/ramprasad090/any_map/issues

topics:
  - maps
  - google-maps
  - maplibre
  - openstreetmap
  - navigation

platforms:
  android:
  ios:
  web:
  macos:
  windows:
  linux:

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
